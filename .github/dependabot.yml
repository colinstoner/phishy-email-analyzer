version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    groups:
      aws-sdk:
        patterns:
          - '@aws-sdk/*'
      dev-dependencies:
        dependency-type: development
    open-pull-requests-limit: 5
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
