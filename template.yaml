AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Phishy Email Analyzer - AI-powered phishing analysis. Users forward
  suspicious emails to a designated address; SES stores them in S3 and
  triggers Lambda, which analyzes them with Claude and replies with a
  security report.

  Two manual steps remain after deploy (CloudFormation cannot do them):
  1) verify your domain in SES and add the DNS/MX records, and
  2) set the created receipt rule set as ACTIVE in the SES console
     (SES allows only one active rule set per account, so this template
     does not force it).

Parameters:
  RecipientEmail:
    Type: String
    Description: Address users forward suspicious emails to (e.g. phishy@yourdomain.com). The domain must be verified in SES with MX records pointing to SES.
  SenderEmail:
    Type: String
    Description: Verified address that analysis reports are sent from (e.g. phishy@yourdomain.com).
  SecurityTeamDistribution:
    Type: String
    Description: Comma-separated address(es) CC'd on all analyses (e.g. security@yourdomain.com).
  SafeDomains:
    Type: String
    Description: Comma-separated domains allowed to submit emails for analysis (e.g. yourdomain.com).
  AIProvider:
    Type: String
    AllowedValues: [anthropic, bedrock]
    Default: bedrock
    Description: bedrock needs no external API key; anthropic requires AnthropicApiKey.
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Default: ''
    Description: Required only when AIProvider is anthropic. Prefer storing this in Secrets Manager and referencing it via dynamic references for production.
  DeleteEmailsAfterProcessing:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: Delete raw emails from S3 once processed.
  CampaignAlertsEnabled:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: >
      When true, Phishy broadcasts an employee warning to CampaignAlertDistribution
      once the same attack is reported by multiple people in a short window
      (>=3 reports, >=2 recipients, within 4 hours). Requires intelligence to be
      enabled (a database) and CampaignAlertDistribution to be set.
  CampaignAlertDistribution:
    Type: String
    Default: ''
    Description: Address the campaign broadcast is sent to (e.g. all-staff@yourdomain.com). Required when CampaignAlertsEnabled is true.
  SafeSenders:
    Type: String
    Default: ''
    Description: Optional. Comma-separated individual addresses allowed to submit emails for analysis, in addition to SafeDomains.
  SafeSenderSecurity:
    Type: String
    Default: ''
    Description: Optional. Address(es) treated as the security team for the email command channel.
  ProfileS3Uri:
    Type: String
    Default: ''
    Description: Optional. s3:// URI of an enterprise profile JSON. Store it under profiles/ in this stack's email bucket so the function's IAM role can read it.
  IntelligenceDbSecretArn:
    Type: String
    Default: ''
    Description: >
      Optional. ARN of a Secrets Manager secret holding the Postgres connection
      string for the threat-intelligence database (a raw connection string, or
      JSON with connectionString/url, or username/password/host fields). Leave
      empty to disable intelligence features. When set, VpcId and SubnetIds are
      required so the Lambda can reach the database privately. Note: with
      AIProvider=anthropic the VPC also needs NAT egress to reach
      api.anthropic.com - interface endpoints only cover AWS services.
  VpcId:
    Type: String
    Default: ''
    Description: VPC the intelligence database lives in. Required when IntelligenceDbSecretArn is set.
  SubnetIds:
    Type: String
    Default: ''
    Description: Comma-separated subnet IDs (two or more AZs recommended) for the Lambda's VPC config. Required when IntelligenceDbSecretArn is set.
  DatabaseSecurityGroupId:
    Type: String
    Default: ''
    Description: Optional. Security group of the Postgres instance. When set, an ingress rule allowing port 5432 from the Lambda's security group is added to it.
  CreateVpcEndpoints:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
    Description: >
      Create interface endpoints (bedrock-runtime, SES API, Secrets Manager)
      so the VPC-attached Lambda can reach AWS services without a NAT gateway
      (about USD 22/month). Set to false if the VPC already has these
      endpoints (only one private-DNS endpoint per service is allowed per
      VPC) or a NAT gateway. The VPC must also have an S3 gateway endpoint or
      NAT route - the Lambda fetches raw emails from S3.

Conditions:
  UseAnthropic: !Equals [!Ref AIProvider, anthropic]
  UseBedrock: !Equals [!Ref AIProvider, bedrock]
  UseIntelligence: !Not [!Equals [!Ref IntelligenceDbSecretArn, '']]
  CreateEndpoints: !And
    - !Condition UseIntelligence
    - !Equals [!Ref CreateVpcEndpoints, 'true']
  CreateBedrockEndpoint: !And
    - !Condition CreateEndpoints
    - !Condition UseBedrock
  HasDatabaseSg: !And
    - !Condition UseIntelligence
    - !Not [!Equals [!Ref DatabaseSecurityGroupId, '']]
  HasSafeSenders: !Not [!Equals [!Ref SafeSenders, '']]
  HasSafeSenderSecurity: !Not [!Equals [!Ref SafeSenderSecurity, '']]
  HasProfile: !Not [!Equals [!Ref ProfileS3Uri, '']]
  UseCampaignAlerts: !And
    - !Condition UseIntelligence
    - !Equals [!Ref CampaignAlertsEnabled, 'true']
    - !Not [!Equals [!Ref CampaignAlertDistribution, '']]

Resources:
  EmailBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-emails-${AWS::AccountId}-${AWS::Region}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ExpireRawEmails
            Status: Enabled
            Prefix: emails/
            ExpirationInDays: 90

  EmailBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref EmailBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSESPuts
            Effect: Allow
            Principal:
              Service: ses.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${EmailBucket.Arn}/emails/*'
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  PhishyFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        EntryPoints:
          - src/index.ts
        External:
          - '@aws-sdk/*'
        Loader:
          - .pem=text
    Properties:
      Handler: index.handler
      Runtime: nodejs22.x
      Architectures: [x86_64]
      MemorySize: 1024
      # 180s accommodates the Bedrock analysis retry budget (~15s/30s/60s backoff
      # over 4 attempts ≈ 105s of waiting) so a transient provider blip is ridden
      # out in-invocation rather than returning an "analysis unavailable" report.
      # Keep in sync with ANALYSIS_* retry constants in bedrock.provider.ts.
      Timeout: 180
      Environment:
        Variables:
          PHISHY_AI_PROVIDER: !Ref AIProvider
          ANTHROPIC_API_KEY: !If [UseAnthropic, !Ref AnthropicApiKey, !Ref AWS::NoValue]
          PHISHY_BEDROCK_REGION: !If [UseBedrock, !Ref AWS::Region, !Ref AWS::NoValue]
          S3_BUCKET_NAME: !Ref EmailBucket
          SENDER_EMAIL: !Ref SenderEmail
          SECURITY_TEAM_DISTRIBUTION: !Ref SecurityTeamDistribution
          SAFE_DOMAINS: !Ref SafeDomains
          PHISHY_AWS_REGION: !Ref AWS::Region
          DELETE_EMAILS_AFTER_PROCESSING: !Ref DeleteEmailsAfterProcessing
          SAFE_SENDERS: !If [HasSafeSenders, !Ref SafeSenders, !Ref AWS::NoValue]
          SAFE_SENDER_SECURITY: !If [HasSafeSenderSecurity, !Ref SafeSenderSecurity, !Ref AWS::NoValue]
          PHISHY_PROFILE: !If [HasProfile, !Ref ProfileS3Uri, !Ref AWS::NoValue]
          PHISHY_INTELLIGENCE_ENABLED: !If [UseIntelligence, 'true', !Ref AWS::NoValue]
          PHISHY_DB_CONNECTION: !If [UseIntelligence, !Ref IntelligenceDbSecretArn, !Ref AWS::NoValue]
          PHISHY_CAMPAIGN_ALERTS_ENABLED: !If [UseCampaignAlerts, 'true', !Ref AWS::NoValue]
          PHISHY_CAMPAIGN_ALERTS_DISTRIBUTION: !If [UseCampaignAlerts, !Ref CampaignAlertDistribution, !Ref AWS::NoValue]
      VpcConfig: !If
        - UseIntelligence
        - SecurityGroupIds:
            - !Ref LambdaSecurityGroup
          SubnetIds: !Split [',', !Ref SubnetIds]
        - !Ref AWS::NoValue
      Policies:
        - Statement:
            - Sid: SendReports
              Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'
            - Sid: ReadStoredEmails
              Effect: Allow
              Action:
                - s3:GetObject
                - s3:DeleteObject
              Resource: !Sub '${EmailBucket.Arn}/emails/*'
            - Sid: ReadProfile
              Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub '${EmailBucket.Arn}/profiles/*'
        - !If
          - UseBedrock
          - Statement:
              - Sid: InvokeBedrock
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - !Sub 'arn:aws:bedrock:*::foundation-model/anthropic.claude-*'
                  - !Sub 'arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/*'
          - !Ref AWS::NoValue
        - !If
          - UseIntelligence
          - Statement:
              - Sid: ReadDbCredentials
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref IntelligenceDbSecretArn
          - !Ref AWS::NoValue

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: UseIntelligence
    Properties:
      GroupDescription: Phishy Lambda egress
      VpcId: !Ref VpcId

  # Lets the Lambda reach the intelligence database without opening the
  # database to anything else.
  DatabaseIngressFromLambda:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasDatabaseSg
    Properties:
      GroupId: !Ref DatabaseSecurityGroupId
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !GetAtt LambdaSecurityGroup.GroupId
      Description: Phishy Lambda to Postgres

  EndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: CreateEndpoints
    Properties:
      GroupDescription: HTTPS from Phishy Lambda to VPC interface endpoints
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !GetAtt LambdaSecurityGroup.GroupId

  # A VPC-attached Lambda has no internet access, so every AWS service the
  # code calls needs a private path: these interface endpoints for Bedrock,
  # the SES API, and Secrets Manager, plus an S3 gateway endpoint (or NAT)
  # the VPC must already provide. CloudWatch metrics need nothing - they are
  # emitted as EMF log lines through the Lambda log pipeline.
  BedrockRuntimeEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: CreateBedrockEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.bedrock-runtime'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: !Split [',', !Ref SubnetIds]
      SecurityGroupIds:
        - !Ref EndpointSecurityGroup

  SesApiEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: CreateEndpoints
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.email'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: !Split [',', !Ref SubnetIds]
      SecurityGroupIds:
        - !Ref EndpointSecurityGroup

  SecretsManagerEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: CreateEndpoints
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.secretsmanager'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: !Split [',', !Ref SubnetIds]
      SecurityGroupIds:
        - !Ref EndpointSecurityGroup

  SESInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PhishyFunction
      Action: lambda:InvokeFunction
      Principal: ses.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

  ReceiptRuleSet:
    Type: AWS::SES::ReceiptRuleSet
    Properties:
      RuleSetName: !Sub '${AWS::StackName}-rules'

  # S3 action MUST come before the Lambda action: SES stores the full raw
  # email first, then the Lambda fetches it from S3 (the SES event itself
  # carries only headers/metadata).
  ReceiptRule:
    Type: AWS::SES::ReceiptRule
    DependsOn:
      - EmailBucketPolicy
      - SESInvokePermission
    Properties:
      RuleSetName: !Ref ReceiptRuleSet
      Rule:
        Name: phishy-analyze
        Enabled: true
        ScanEnabled: true
        Recipients:
          - !Ref RecipientEmail
        Actions:
          - S3Action:
              BucketName: !Ref EmailBucket
              ObjectKeyPrefix: emails/
          - LambdaAction:
              FunctionArn: !GetAtt PhishyFunction.Arn
              InvocationType: Event

Outputs:
  FunctionArn:
    Description: Phishy Lambda function ARN
    Value: !GetAtt PhishyFunction.Arn
  EmailBucketName:
    Description: Bucket where SES stores raw emails
    Value: !Ref EmailBucket
  ReceiptRuleSetName:
    Description: Rule set to activate in the SES console (Email receiving -> Rule sets -> Set as active)
    Value: !Ref ReceiptRuleSet
  NextSteps:
    Description: Remaining manual steps
    Value: !Sub 'Verify the domain of ${RecipientEmail} in SES (DNS + MX records), then set rule set "${ReceiptRuleSet}" as active. In SES sandbox mode, also verify recipient addresses.'
